<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BitMart CS Widget - Demo</title>
    <style>
      /* This page simulates embedding the widget on any page */
      body {
        margin: 0;
        padding: 40px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f5f5;
        color: #333;
      }
      .demo-notice {
        max-width: 600px;
        margin: 100px auto;
        text-align: center;
        color: #666;
      }
      .demo-notice h1 { color: #1B2B4B; margin-bottom: 12px; }
      .demo-notice p { line-height: 1.6; }
      .demo-notice code {
        background: #e8e8e8;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 13px;
      }
      .demo-notice pre {
        background: #1B2B4B;
        color: #00D4AA;
        padding: 16px 20px;
        border-radius: 8px;
        text-align: left;
        overflow-x: auto;
        font-size: 13px;
        line-height: 1.5;
      }
    </style>
    <script type="module" crossorigin src="/bitmart-cs-widget/assets/index-C2D5_rYw.js"></script>
  </head>
  <body>
    <div class="demo-notice">
      <h1>🤖 BitMart AI Customer Support Widget</h1>
      <p>This widget can be embedded on <strong>any page</strong> — including Zendesk Help Center.</p>
      <p>Just add this one line before <code>&lt;/body&gt;</code>:</p>
      <pre>&lt;script src="https://your-cdn.com/bitmart-cs-widget.iife.js"&gt;&lt;/script&gt;</pre>
      <p style="margin-top: 20px; color: #999;">👉 Look at the bottom-right corner — the widget is already running.</p>
    </div>

    <!-- This is how the widget gets embedded — just one script tag -->
  </body>
</html>
